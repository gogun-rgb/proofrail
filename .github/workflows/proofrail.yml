name: Proofrail

on:
  workflow_call:
    inputs:
      config-path:
        type: string
        required: false
        default: .proofrail/config.yml
      strict:
        type: boolean
        required: false
        default: true

permissions:
  contents: read
  pull-requests: read
  checks: read
  statuses: read

jobs:
  proofrail:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Validate pull request target
        id: validate
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          CONFIG_PATH: ${{ inputs.config-path }}
        run: |
          if [[ "$EVENT_NAME" != "pull_request" || ! "$PR_NUMBER" =~ ^[1-9][0-9]*$ ]]; then
            echo "Proofrail: pull request event is required." >&2
            exit 1
          fi
          [[ "$BASE_SHA" =~ ^[0-9a-fA-F]{40}$ ]] || {
            echo "Proofrail: invalid base SHA." >&2
            exit 1
          }
          [[ "$HEAD_SHA" =~ ^[0-9a-fA-F]{40}$ ]] || {
            echo "Proofrail: invalid head SHA." >&2
            exit 1
          }
          if [[ "$CONFIG_PATH" != ".proofrail/config.yml" ]]; then
            echo "Proofrail: unsafe config path." >&2
            exit 1
          fi

      - name: Check out exact base
        id: checkout-base
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: ${{ github.event.pull_request.base.repo.full_name }}
          ref: ${{ github.event.pull_request.base.sha }}
          path: proofrail-base
          fetch-depth: 1
          persist-credentials: false

      - name: Check out exact head
        id: checkout-head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: proofrail-target
          fetch-depth: 1
          persist-credentials: false

      - name: Check out exact Proofrail workflow source
        id: checkout-tool
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: gogun-rgb/proofrail
          ref: ${{ github.workflow_sha }}
          path: proofrail-tool
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Node
        id: setup-node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: 24

      - name: Enable pnpm
        id: corepack
        shell: bash
        run: corepack enable

      - name: Install Proofrail
        id: install
        shell: bash
        run: pnpm --dir proofrail-tool install --frozen-lockfile

      - name: Collect exact pull request event
        id: event
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          node proofrail-tool/packages/evidence-gate/src/workflow-event-cli.mjs \
            --github-repo "$GITHUB_REPOSITORY" \
            --pull-request "$PR_NUMBER" \
            --base-sha "$BASE_SHA" \
            --head-sha "$HEAD_SHA" \
            --output "$RUNNER_TEMP/proofrail-event.json"

      - name: Evaluate exact pull request
        id: prototype
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          CONFIG_PATH: ${{ inputs.config-path }}
          STRICT: ${{ inputs.strict }}
        run: |
          node proofrail-tool/packages/evidence-gate/src/prototype-cli.mjs \
            --event "$RUNNER_TEMP/proofrail-event.json" \
            --repo proofrail-target \
            --config "proofrail-base/$CONFIG_PATH" \
            --output proofrail-output \
            --shell /usr/bin/bash \
            --github-repo "$GITHUB_REPOSITORY" \
            --pull-request "$PR_NUMBER" \
            --strict

      - name: Publish Proofrail summary
        id: summary
        if: always()
        shell: bash
        run: |
          if [[ -f proofrail-output/summary.md ]]; then
            cat proofrail-output/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Proofrail did not produce a summary" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Evidence Bundle
        id: artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: proofrail-evidence
          path: proofrail-output/
          if-no-files-found: error
          retention-days: 14

      - name: Preserve Proofrail status
        id: final
        if: always()
        shell: bash
        env:
          STRICT: ${{ inputs.strict }}
          PROTOTYPE_OUTCOME: ${{ steps.prototype.outcome }}
          ARTIFACT_OUTCOME: ${{ steps.artifact.outcome }}
        run: |
          [[ "$PROTOTYPE_OUTCOME" == "success" ]] || exit 1
          [[ "$ARTIFACT_OUTCOME" == "success" ]] || exit 1
          if [[ "$STRICT" == "true" ]]; then
            test -f proofrail-output/evidence-bundle.json || exit 1
            verdict="$(node -e 'const fs=require("fs"); const b=JSON.parse(fs.readFileSync("proofrail-output/evidence-bundle.json","utf8")); process.stdout.write(String(b.verdict ?? ""));')"
            [[ "$verdict" == "ADMISSIBLE" ]] || exit 1
          fi
