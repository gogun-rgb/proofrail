name: Foundation Governance

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  foundation-governance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate foundation governance
        run: node scripts/validate-foundation.mjs