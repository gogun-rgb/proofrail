lockfileVersion: '9.0'

settings:
  autoInstallPeers: true
  excludeLinksFromLockfile: false

importers:

  .:
    dependencies:
      preset-local-dependency:
        specifier: file:./local-dependency
        version: file:local-dependency

packages:

  preset-local-dependency@file:local-dependency:
    resolution: {directory: local-dependency, type: directory}

snapshots:

  preset-local-dependency@file:local-dependency: {}
