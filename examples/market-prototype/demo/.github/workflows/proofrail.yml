name: Proofrail

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read
  checks: read
  statuses: read

jobs:
  proofrail:
    name: Proofrail
    uses: gogun-rgb/proofrail/.github/workflows/proofrail.yml@5e346a6bfd4618afe658a03cf403236cd248129f
    with:
      config-path: .proofrail/config.yml
      strict: true
    permissions:
      contents: read
      pull-requests: read
      checks: read
      statuses: read
