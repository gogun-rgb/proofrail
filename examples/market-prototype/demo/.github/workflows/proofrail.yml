name: Proofrail

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read
  checks: read
  statuses: read

jobs:
  proofrail:
    name: Proofrail
    uses: gogun-rgb/proofrail/.github/workflows/proofrail.yml@166573bc5ea5c32e7f8f0ed0943e67e466df9fcb
    with:
      config-path: .proofrail/config.yml
      strict: true
    permissions:
      contents: read
      pull-requests: read
      checks: read
      statuses: read
